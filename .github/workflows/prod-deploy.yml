name: Prod Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      compose_file: docker-compose.prod.yml
      image_tag: ${{ github.sha }}
    secrets:
      EC2_HOST: ${{ secrets.PROD_EC2_HOST }}
      EC2_KEY: ${{ secrets.PROD_EC2_KEY }}