name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      compose_file:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      EC2_HOST:
        required: true
      EC2_KEY:
        required: true
      EC2_USERNAME:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, tag, and push image to GHCR
        env:
          REGISTRY: ghcr.io
          REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          # 이미지 이름은 반드시 소문자여야 함
          IMAGE_NAME=$(echo "$REGISTRY/$REPOSITORY/my-cicd-app" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          source: "${{ inputs.compose_file }}"
          target: "~/app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/app
            
            # GHCR 로그인 (EC2에서 이미지를 당겨오기 위함)
            # EC2가 Private Repository에 접근하려면 PAT가 필요하지만,
            # Public Repository로 패키지를 설정하면 로그인이 필요 없습니다.
            # 여기서는 GITHUB_TOKEN을 사용할 수 없으므로, 이미지를 Public으로 설정했다고 가정하거나,
            # 퍼블릭 이미지가 아닐 경우를 대비해 스크립트 실행 환경에서 로그인할 수단을 제공해야 합니다.
            # 하지만 GitHub 내장 기능(GHCR)의 장점을 살리기 위해, GitHub 패키지 접근 권한을 Public으로 하길 권장합니다.
            
            IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}/my-cicd-app" | tr '[:upper:]' '[:lower:]')
            export IMAGE_TAG=${{ inputs.image_tag }}
            
            # docker-compose.yml 파일 내의 image 속성 변경
            sed -i "s|image: .*|image: $IMAGE_NAME:$IMAGE_TAG|g" ${{ inputs.compose_file }}
            
            docker compose -f ${{ inputs.compose_file }} pull
            docker compose -f ${{ inputs.compose_file }} up -d --force-recreate
            docker image prune -f

      - name: Check Health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME || 'ubuntu' }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Waiting for app to be healthy..."
            for i in {1..10}; do
              STATUS=$(docker inspect --format='{{json .State.Health.Status}}' my-cicd-app-${{ inputs.environment }} | tr -d '"')
              if [ "$STATUS" = "healthy" ]; then
                echo "App is healthy!"
                exit 0
              fi
              echo "Current status: $STATUS. Waiting 10 seconds..."
              sleep 10
            done
            echo "App failed to become healthy."
            exit 1
